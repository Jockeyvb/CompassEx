name: Deploy DocFX Docs

on:
  push:
    branches:
      - master # 触发构建的分支，根据你的主分支名（如 master）修改

# 授予发布 GitHub Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同时只有一个发布任务在运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # 根据你的项目需要选择 .NET 版本

      - name: Install Tool & Build Docs
        run: |
          # 1. 更新并安装 docfx 工具
          dotnet tool update -g docfx
          
          # 2. 强制忽略本地错乱的绝对路径，改用官方标准源下载包
          dotnet restore --ignore-failed-sources --source "https://nuget.org"
          
          # 3. 优先完整编译项目，让项目里的 Source Generator 成功运行并缓存
          dotnet build -c Release
          
          # 4. 运行 docfx 生成文档网页
          docfx docfx.json

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # 对应 docfx.json 中的输出目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
