name: Deploy DocFX Docs

on:
  push:
    branches:
      - master # 触发构建的分支

# 授予发布 GitHub Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同时只有一个发布任务在运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 💡 新增：安装 Node.js 环境，这是运行 npx pagefind 的基础
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tool & Build Docs
        run: |
          # 1. 更新并安装 docfx 工具
          dotnet tool update -g docfx
          
          # 2. 干净还原主项目包
          dotnet restore CompassEx/CompassEx.csproj
          
          # 3. 仅编译主项目，彻底绕过 MAUI 测试项目
          dotnet build CompassEx/CompassEx.csproj -c Release --no-restore
          
          # 4. 执行 docfx metadata (生成元数据)
          docfx metadata docfx.json
          
          # 5. 执行 docfx build (编译静态网页到 _site)
          docfx build docfx.json
          
          # 6. 使用指定版本的 Pagefind 为 _site 文件夹生成搜索索引
          npx pagefind@1.2.0 --site _site

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site' # 对应 docfx 生成并被 pagefind 注入过的输出目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
