    id: ToObjet
    path: CompassEx/Comm/Defined.cs
    startLine: 95
  assemblies:
  - CompassEx
  namespace: CompassEx.Comm
  summary: 将内部的 <xref href="CompassEx.Comm.CompassObjType.Obj" data-throw-if-not-resolved="false"></xref> 安全转换为指定的泛型类型，支持类型自动推导。
  remarks: >-
    此方法内部使用 <xref href="System.Type.IsAssignableFrom(System.Type)" data-throw-if-not-resolved="false"></xref> 进行安全的类型继承链检查。

    采用 <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/out">out</a> 关键字设计，使得外部调用时可以通过 <code>out var</code> 语法省略泛型参数的具体书写，提高代码可读性。
  example:
  - >-
    <pre><code class="lang-csharp">CompassObjType item = GetCompassData();


    // 利用 out var 特性，外部无需显式书写 &lt;GuoSubClass&gt;

    if (item.ToObjet(out GuoSubClass guoObj))

    {
        // 转换成功，直接使用强类型变量 guoObj
        Console.WriteLine($"成功获取到郭氏对象，名称为: {guoObj.Name}");
    }

    else

    {
        Console.WriteLine("类型不匹配或对象为空。");
    }</code></pre>
  syntax:
    content: public bool ToObjet<T>(out T result)
    parameters:
    - id: result
      type: '{T}'
      description: 输出参数。如果转换成功，则返回转型后的 <code class="typeparamref">T</code> 类型实例；如果转换失败，则返回该类型的默认值（<a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/default">default</a>）。
    typeParameters:
    - id: T
      description: 期望转换的目标输出类型。
    return:
      type: System.Boolean
      description: 如果 <xref href="CompassEx.Comm.CompassObjType.Obj" data-throw-if-not-resolved="false"></xref> 不为 <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> 且其类型兼容于 <code class="typeparamref">T</code>，则返回 <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>；否则返回 <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>。
    content.vb: Public Function ToObjet(Of T)(result As T) As Boolean
