  summary: 用于封装和标识罗盘对象的元数据及其实例的结构体。
  remarks: >-
    该结构体主要用于多类型罗盘数据块的统一存储（例如存入 <xref href="System.Collections.Generic.List%601" data-throw-if-not-resolved="false"></xref>），

    它将罗盘对象的中文名称、运行时类型、实例引用以及所对应的角度范围（<xref href="CompassEx.Comm.CompassRangEX" data-throw-if-not-resolved="false"></xref>）打包在一起，

    并提供安全的类型分发与转换机制。
