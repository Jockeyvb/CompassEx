    id: ApplyBaseProperties
    path: CompassEx/Comm/Comm.cs
    startLine: 53
  assemblies:
  - CompassEx
  namespace: CompassEx.Comm
  summary: 扩展方法：利用运行时反射（Reflection）机制，强行从父级基类模板中将所有属性与字段的值“浅拷贝”反灌给当前继承类实例。
  remarks: >-
    <b>🛠️ 内部反射拷贝门道与避坑提示：</b>

    <ol><li><b>属性遍历</b>：方法首先通过 <code>typeof(TBase).GetProperties()</code> 捕获父类公开属性，并通过 <code>prop.CanWrite</code> 安全拦截，防止对只读属性或受保护的 Get 块执行非法注入。</li><li><b>字段反灌</b>：随后通过 <code>typeof(TBase).GetFields()</code> 递归提取底层物理字段并完成原子值覆写。</li><li><b>⚠️ 性能与安全警告</b>：由于使用了运行时动态反射，该操作会带来较大的 CPU 耗能，<b>在高频循环或深层装卦排盘时应克制使用</b>。另外，它仅支持第一层浅拷贝，若字段中含有 <code>List&lt;T&gt;</code> 等引用类型，两端实例会共享同一份内存地址，修改时存在联动篡改的隐患，在跨变卦深度计算时需高度注意。</li></ol>


    该方法常用于在 JSON 反序列化后期生命周期中，快速将多字段的静态基类参数直接克隆给派生实体类。
  example: []
  syntax:
    content: 'public static void ApplyBaseProperties<TChild, TBase>(this TChild child, TBase baseTemplate) where TChild : TBase'
    parameters:
    - id: child
      type: '{TChild}'
      description: 正在接受赋值的当前继承类（子类）目标对象实例。
    - id: baseTemplate
      type: '{TBase}'
      description: 作为数据源的基类（父类）实体模板对象。
    typeParameters:
    - id: TChild
      description: 继承类（派生类）的具体类型，必须隐式继承自 <code class="typeparamref">TBase</code>。
    - id: TBase
      description: 基类（模板类）的具体类型。
    content.vb: Public Shared Sub ApplyBaseProperties(Of TChild As TBase, TBase)(child As TChild, baseTemplate As TBase)
