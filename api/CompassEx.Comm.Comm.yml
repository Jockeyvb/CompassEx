  namespace: CompassEx.Comm
  summary: 全自动初始化罗盘引擎中赖以运行的所有底层基本数据。
  remarks: >-
    <b>初始化加载名堂：</b><br />

    该方法在系统启动或反序列化时应被优先调用。它会通过内部流水线依次唤醒并充填两套最核心的周天度数数据：


    <ul><li>调用 <xref href="CompassEx.CompassEx.LoadAllCAfterGuos" data-throw-if-not-resolved="false"></xref>：全量装载后天六十四卦罗盘圈层分度范围数据。</li><li>调用 <xref href="CompassEx.CompassEx.LoadAllBeforGuos" data-throw-if-not-resolved="false"></xref>：全量装载伏羲先天六十四卦方圆图周天物理刻度数据。</li></ul>
  example: []
  syntax:
    content: public static void AllInit()
    content.vb: Public Shared Sub AllInit()
