  assemblies:
  - CompassEx
  namespace: CompassEx.Comm
  summary: 表示一个罗盘度数的角度范围。
  remarks: >-
    该类用于处理 $0^\circ$ 到 $360^\circ$ 之间的角度区间判定。

    它支持正常的递增区间（例如 $10^\circ \sim 50^\circ$），

    同时也原生支持跨越 $360^\circ$ 边界的循环区间（例如 $350^\circ \sim 20^\circ$）。
  example: []
