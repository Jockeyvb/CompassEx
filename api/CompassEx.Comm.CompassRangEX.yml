  assemblies:
  - CompassEx
  namespace: CompassEx.Comm
  summary: 确定指定的角度是否包含在当前的罗盘范围内。
  remarks: >-
    判定规则采用前闭后开区间 $[Start, End)$。


    <p>如果 <xref href="CompassEx.Comm.CompassRangEX.End" data-throw-if-not-resolved="false"></xref> &gt; <xref href="CompassEx.Comm.CompassRangEX.Start" data-throw-if-not-resolved="false"></xref>：正常范围判定，需同时满足大于等于 Start 且小于 End。</p>

    <p>如果 <xref href="CompassEx.Comm.CompassRangEX.End" data-throw-if-not-resolved="false"></xref> &lt;= <xref href="CompassEx.Comm.CompassRangEX.Start" data-throw-if-not-resolved="false"></xref>：说明范围跨越了 $360^\circ$ 界限，满足大于等于 Start 或小于 End 即可。</p>
  example: []
  syntax:
    content: public bool IsInRange(double dValue)
    parameters:
    - id: dValue
      type: System.Double
      description: 需要判定的目标角度（度）。支持负数或大于360度的值，内部会自动执行标准化。
    return:
      type: System.Boolean
      description: 如果 <code class="paramref">dValue</code> 在当前范围内，则返回 <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>；否则返回 <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>。
    content.vb: Public Function IsInRange(dValue As Double) As Boolean
