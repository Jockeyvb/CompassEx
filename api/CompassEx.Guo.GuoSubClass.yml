  assemblies:
  - CompassEx
  namespace: CompassEx.Guo
  summary: 依据先天经卦序列索引初始化三爻经卦对象实例（核心构造函数）。
  remarks: >-
    <b>⚠️ 调用规范：</b><br />

    使用此构造函数创建的单卦类默认为下卦。在进行宏观六爻复卦装配时，建议使用具备显式方位标识的工厂方法 <xref href="CompassEx.Guo.GuoSubClass.GetGuoSub(System.Int32%2cSystem.Int32%2cSystem.Int32%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>。<br /><br />

    <b>经卦底层数理装配流程：</b>

    <ol><li><b>安全边界校验</b>：校验输入索引。若执行不合法则瞬间熔断并抛出越界异常。</li><li><b>爻象阴阳重组（Switch 分布）</b>：依据先天八卦符号编码（0代表阴爻，1代表阳爻），由下而上对长为 3 的 <xref href="CompassEx.Guo.GuoSubClass.Yaos" data-throw-if-not-resolved="false"></xref> 数组进行赋值（如 case 1 兑卦：初爻为阳(1)、二爻为阳(1)、三爻为阴(0)）。</li><li><b>基础术数属性反哺</b>：通过索引同步锁定并充填物象（<xref href="CompassEx.Guo.GuoSubClass.GuoSubAttrName" data-throw-if-not-resolved="false"></xref>）、六亲伦理（<xref href="CompassEx.Guo.GuoSubClass.GuoSubReluName" data-throw-if-not-resolved="false"></xref>）和基本单字卦名。</li><li><b>跨体系方位映射</b>：通过后天八卦清册反查其在文王后天九宫中的绝对物理位置（<code>iPos</code>），进而将对应方位的紫白九星颜色（<xref href="CompassEx.Guo.GuoSubClass.AfterGuoSubColor" data-throw-if-not-resolved="false"></xref>）以及最终的生克五行属性（<xref href="CompassEx.Guo.GuoSubClass.FiveAttr" data-throw-if-not-resolved="false"></xref>）彻底装载完毕。</li></ol>
  example: []
  syntax:
    content: public GuoSubClass(int iBeforGuoIndex)
    parameters:
    - id: iBeforGuoIndex
      type: System.Int32
      description: 先天单卦的原始数组位置索引（取值范围：<code>0</code> 至 <code>7</code>，对应乾一至坤八）。
    content.vb: Public Sub New(iBeforGuoIndex As Integer)
  overload: CompassEx.Guo.GuoSubClass.#ctor*
  exceptions:
  - type: System.IndexOutOfRangeException
    commentId: T:System.IndexOutOfRangeException
    description: 当传入的索引超出合法安全边界（小于 0 或大于等于数组总长度）时抛出。
  nameWithType.vb: GuoSubClass.New(Integer)
  fullName.vb: CompassEx.Guo.GuoSubClass.New(Integer)
  name.vb: New(Integer)
