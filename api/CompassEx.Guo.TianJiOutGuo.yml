  assemblies:
  - CompassEx
  namespace: CompassEx.Guo
  summary: >-
    天机出卦法是根据六爻卦之卦宫(六纯卦）进行八卦爻变<br />

    七世飞爻得出五卦（三爻卦）为入卦，三个卦为出卦（三爻卦），并可查询本卦卦宫序列卦集合<br />

    一般三元罗盘上的<b><font color="red">向卦(六爻卦)</font></b>为入参结构本类
