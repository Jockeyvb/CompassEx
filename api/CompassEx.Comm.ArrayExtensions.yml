  assemblies:
  - CompassEx
  namespace: CompassEx.Comm
  summary: 扩展方法：在给定的强类型一维数组中，高效正向检索特定元素并返回其首次出现的零基（Zero-based）索引。
  remarks: 该方法是对原生静态函数 <xref href="System.Array.IndexOf%60%601(%60%600%5b%5d%2c%60%600)" data-throw-if-not-resolved="false"></xref> 的流式桥接封装，允许类库在内部对静态数组数据（如干支集、卦序表）直接像调用 List 一样使用流畅的 <code>array.IndexOf(value)</code> 语法，从而大幅减少语法噪音。
  example: []
  syntax:
    content: public static int IndexOf<T>(this T[] array, T value)
    parameters:
    - id: array
      type: '{T}[]'
      description: 当前正在执行检索的目标一维数组实体。
    - id: value
      type: '{T}'
      description: 期望在数组中匹配定位的目标对象或数值。
    typeParameters:
    - id: T
      description: 数组内部元素的泛型类型。
    return:
      type: System.Int32
      description: 返回匹配项在数组中的绝对索引位置（范围在 <code>0</code> 到 <code>Length - 1</code> 之间）；若全盘未匹配成功，则返回标准未找到标识 <code>-1</code>。
    content.vb: Public Shared Function IndexOf(Of T)(array As T(), value As T) As Integer
