  assemblies:
  - CompassEx
  namespace: CompassEx
  summary: >-
    先天64卦对象(天盘），使用字典缓存所有64卦对象，避免每次计算时都创建新的对象，提高性能，需要优先初始化

    罗盘上先天排行从午为乾1、兑2、离3、震4（阳仪），巽5、坎6、艮7、坤8午（阴仪）

    罗盘上子坤（360度）至午乾（180度）从坤0度至天风姤180度，乾左为顺180度至地雷复360，内卦为卦宫外卦相荡而成
