    方法会首先审查 <xref href="CompassEx.Guo.GuoClass.YaoDoing" data-throw-if-not-resolved="false"></xref> 动爻清册。若存在动爻，会动态将对应的内卦（<xref href="CompassEx.Guo.GuoClass.DownGuo" data-throw-if-not-resolved="false"></xref>）或外卦（<xref href="CompassEx.Guo.GuoClass.UpGuo" data-throw-if-not-resolved="false"></xref>）的原始阴阳代码（0或1）重设为 3（老阳动变）或 4（老阴动变）。<br />

    随后按初爻至上爻的顺序组装整型序列，递交给静态方法 <xref href="CompassEx.Guo.GuoClass.GetGuoFace(System.Collections.Generic.List%7bSystem.Int32%7d)" data-throw-if-not-resolved="false"></xref> 实施终极画面输出。
