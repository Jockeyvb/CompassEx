  summary: 静态公共方法：将扁平化的爻象阴阳状态码序列，逆向渲染为标准易学卦象图形。
  remarks: >-
    <b>爻象数字代码与图形对照表：</b>

    <ul><li><code>0</code>：代表常规阴爻（两段少阴）-&gt; <code>"─　─　\n"</code></li><li><code>4</code>：代表发动阴爻（交爻老阴，带有变爻标记 x）-&gt; <code>"─　─x \n"</code></li><li><code>1</code>：代表常规阳爻（单段少阳）-&gt; <code>"───　\n"</code></li><li><code>3</code>：代表发动阳爻（重爻老阳，带有动爻标记 o）-&gt; <code>"───o \n"</code></li></ul>


    渲染循环严格遵循传统画卦由上而下的习惯，从 <code>Count - 1</code> 开始递减打印至 0。
  example: []
