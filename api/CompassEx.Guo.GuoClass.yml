  assemblies:
  - CompassEx
  namespace: CompassEx.Guo
  summary: 依据卦序索引初始化复卦（六爻卦）对象实例（核心构造函数）。
  remarks: >-
    该构造函数内部执行了一套完整的易学数理装配流程：


    <ol><li><b>边界校验</b>：验证索引安全性，不合法则抛出异常。</li><li><b>卦名检索</b>：根据索引获取四字全名（如“水雷屯”），并通过 <xref href="CompassEx.Guo.GuoClass.GetFullGuoName(System.String)" data-throw-if-not-resolved="false"></xref> 规范化。</li><li><b>经卦拆解</b>：调用 <xref href="CompassEx.Guo.GuoClass.GetGuoSubName(System.String%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> 将六爻卦物理切割为上卦（外卦）和下卦（内卦）两个三爻卦字符串。</li><li><b>对象装配</b>：通过 <xref href="CompassEx.Guo.GuoSubClass.GetGuoSub(System.Int32%2cSystem.Int32%2cSystem.Int32%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> 实例化上下卦对象，并锁定该卦在系统中的最终简名与全名属性。</li></ol>
