  assemblies:
  - CompassEx
  namespace: CompassEx.Guo
  summary: 计算并演录当前纯卦的“京房易八宫卦变规律”，生成完整的七世飞爻卦链表（含主卦共 8 个卦）。
  remarks: >-
    <b>京房易 64 卦变卦核心算法步骤：</b>

    <ol><li><b>本宫主卦</b>：第 1 卦为纯卦自身（如乾为天）。</li><li><b>一世至五世卦</b>：从初爻（索引 0）开始逐爻向上发动变易（少阳变老阴或少阴变老阳），直至第五爻变出五世卦，连续记录 5 次。</li><li><b>游魂卦（第 7 卦）</b>：在五世卦的基础上，不再往上变上爻，而是<b>退回第四爻（索引 3）</b>发生动变。</li><li><b>归魂卦（第 8 卦）</b>：在游魂卦的基础上，将<b>内卦（下卦，索引 0, 1, 2）的三枚爻象全变</b>，使其重归本宫五行属性。</li></ol>


    该方法常用于计算推演命主八字入卦、星盘飞爻立极等高级术数逻辑。
  example: []
  syntax:
    content: public List<GuoClass> Get7HereYaoGuo()
    return:
      type: System.Collections.Generic.List{CompassEx.Guo.GuoClass}
      description: 返回一个按演变顺序排列的复卦集合 <code>List&lt;GuoClass&gt;</code>，依次为主卦、一世、二世、三世、四世、五世、游魂卦、归魂卦。
    content.vb: Public Function Get7HereYaoGuo() As List(Of GuoClass)
  overload: CompassEx.Guo.GuoClass.Get7HereYaoGuo*
  exceptions:
  - type: System.Exception
    commentId: T:System.Exception
    description: 当当前卦不是“八纯卦”（即上卦外卦与下卦内卦不相同时）抛出该异常，因为非纯卦无法作为八宫立极之主。
