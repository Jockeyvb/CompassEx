  summary: 静态工厂方法：接收一个包含 6 个爻状态码的整型列表，重组并反灌创建带有变爻动静的复卦对象实例。
  remarks: >-
    <b>状态码重组与动爻捕获数理逻辑：</b><br />

    <ul><li><b>经卦解耦</b>：取列表前 3 爻模 2 运算生成下卦（内卦），取后 3 爻模 2 运算生成上卦（外卦）。</li><li><b>动爻拦截（老阴老阳判定）</b>：算法循环遍历 6 个爻。若状态码为 <code>3</code>（老阳，阳动变阴）或 <code>4</code>（老阴，阴动变阳），则会被视为动爻，自动抽离并装入本卦的 <xref href="CompassEx.Guo.GuoClass.YaoDoing" data-throw-if-not-resolved="false"></xref> 动爻跟踪清册中，并同步重设对应经卦的运行时爻位状态。</li></ul>
  example: []
  syntax:
    content: public static GuoClass GetGuoClass(List<int> iYaos)
    parameters:
    - id: iYaos
      type: System.Collections.Generic.List{System.Int32}
      description: 包含 6 个爻状态的整型列表（索引自低到高严格对应初爻至上爻）。
    return:
      type: CompassEx.Guo.GuoClass
      description: 返回装配好的复卦实例；如果传入的列表长度不等于 6 则返回 <code>null</code>。
    content.vb: Public Shared Function GetGuoClass(iYaos As List(Of Integer)) As GuoClass
