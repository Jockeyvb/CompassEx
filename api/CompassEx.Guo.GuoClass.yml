  assemblies:
  - CompassEx
  namespace: CompassEx.Guo
  summary: 静态工厂方法（术数算法）：执行经典的先天梅花易数数字起卦逻辑，推演并返回对应带有动爻的复卦。
  remarks: >-
    <b>⚠️ 警告：</b>此方法生成的复卦仅供梅花易数体用断卦，其外围的“六亲”、“六神”等断语属性<b>默认未加载</b>。<br /><br />

    <b>梅花数理起卦公式明堂：</b>

    <ol><li><b>上卦公式</b>：<code>(iv1 % 8) - 1</code>。若余数为 0（取模归零），则强行重设为 7（对应乾一、兑二...坤八的数组边界）。</li><li><b>下卦公式</b>：<code>(iv2 % 8) - 1</code>。同样执行归零校验，并通过排除重复字提取出下卦物象，拼接成模糊模糊字以便反查。</li><li><b>动爻公式（取变爻）</b>：<code>((iv1 + iv2) % 6) - 1</code>。相加余数除 6 的余数锁定动爻。若余数为 0 则重设为 5（代表上爻/第六爻发动）。</li></ol>


    算法最后会自动识别动爻爻位所处的空间（内卦或外卦），将少阴/少阳直接转化为对应的老阴（4）或老阳（3），完成起卦闭环。
  example: []
  syntax:
    content: public static GuoClass FlowerGuoClass(int iv1, int iv2)
    parameters:
    - id: iv1
      type: System.Int32
      description: 上卦计算基数（如：年支数+月数+日数之和，或上两字笔画数）。
    - id: iv2
      type: System.Int32
      description: 下卦计算基数（如：年支数+月数+日数+时支数之和，或下两字笔画数）。
    return:
      type: CompassEx.Guo.GuoClass
      description: 返回依照先天梅花数理生成的 <xref href="CompassEx.Guo.GuoClass" data-throw-if-not-resolved="false"></xref> 复卦实例。
    content.vb: Public Shared Function FlowerGuoClass(iv1 As Integer, iv2 As Integer) As GuoClass
  overload: CompassEx.Guo.GuoClass.FlowerGuoClass*
  nameWithType.vb: GuoClass.FlowerGuoClass(Integer, Integer)
