  summary: 计算并返回当前复卦对应的三元玄空“大卦运”名称（一运至九运）。
  remarks: >-
    <b>卦运阴阳对比推导核心算法：</b><br />

    卦象爻是由下而上生发的。算法会将上卦（外卦）的三枚爻与下卦（内卦）对应的三枚爻进行从下往上的两两阴阳符号判等（取模模 2 校验法）：


    <ul><li><b>一运卦</b>：上卦下卦三爻的阴阳结构<b>完全相同</b>。</li><li><b>九运卦</b>：上卦下卦三爻的阴阳结构<b>完全相反（全错卦）</b>。</li><li><b>其它运卦</b>：根据初爻、中爻、上爻各自发生变换的错位组合，分别归入二、三、四、六、七、八运（注：五运归中，无独立五运大卦）。</li></ul>
  example: []
  syntax:
    content: >-
      [JsonIgnore]

      public string GuoFate { get; }
    parameters: []
    return:
      type: System.String
      description: 返回代表大卦运的一字中文数字字符串（如：“一”、“二”、“三”、“四”、“六”、“七”、“八”、“九”）。
