    <ol><li><b>完整性审查</b>：检查主卦现有的六亲（<xref href="CompassEx.Guo.GuoClass.SixRelative" data-throw-if-not-resolved="false"></xref>）是否涵盖了全部五大关系。若缺项则代表有伏神。</li><li><b>母宫映射</b>：提取当前复卦所隶属的本宫八纯大卦（<xref href="CompassEx.Guo.GuoClass.GuoSelf" data-throw-if-not-resolved="false"></xref>），并将其完全具象化加载出六亲配置。</li><li><b>差集过滤</b>：比对主卦与本宫纯卦，找出主卦中缺失的那个六亲名称（如妻财、官鬼），计算其在母宫中的原始爻位，将其封存至 <xref href="CompassEx.Guo.GuoClass.HideRelative" data-throw-if-not-resolved="false"></xref> 及其爻位坐标轴中。</li></ol>
