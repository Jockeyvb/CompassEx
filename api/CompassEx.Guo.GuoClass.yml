  remarks: >-
    <b>装卦生克数理逻辑：</b><br />

    方法会依次轮询下卦（贞卦）和上卦（悔卦）共六个爻位的纳支（<xref href="CompassEx.Comm.LocClass" data-throw-if-not-resolved="false"></xref>）。<br />

    调用核心交叉规则 <xref href="CompassEx.Comm.FiveAttr.GetBothAttrRule(System.String%2cSystem.String)" data-throw-if-not-resolved="false"></xref>，以母本卦宫的五行属性（我）为基准点，与各爻位纳支五行（他）进行“生我者父母、我生者子孙、克我者官鬼、我克者妻财、比和者兄弟”的五行断立，最终写入 <xref href="CompassEx.Guo.GuoClass.SixRelative" data-throw-if-not-resolved="false"></xref> 列表。
