  summary: 静态公共方法：依据输入的日柱天干与地支，动态推导并获取该旬中处于“空亡”状态的两个地支对象。
  remarks: >-
    <b>旬空运算法则：</b><br />

    六十甲子以十天为一旬。算法首先锁定天干与地支在标准排布中的索引位置，

    计算出该旬距离终点（第十个天干“癸”）的地支富余偏移量 <code>iPos = 9 - iSPos</code>，

    顺推求得紧随其后的两个孤虚地支索引，若超出 11（亥位）则执行天干地支五行圆周取模（<code>-12</code>）完成闭环定位。
  example: []
  syntax:
    content: public static List<LocClass> GetLostLocs(string sSkyName, string sLocName)
    parameters:
    - id: sSkyName
      type: System.String
      description: 预测当日的日干名称（如：“甲”、“乙”、“丙”等）。
    - id: sLocName
      type: System.String
      description: 预测当日的日支名称（如：“子”、“丑”、“寅”等）。
    return:
      type: System.Collections.Generic.List{CompassEx.Comm.LocClass}
      description: 返回包含两个截路空亡地支实体对象的集合 <code>List&lt;LocClass&gt;</code>。
